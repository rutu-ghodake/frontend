<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .box{
           min-width: 900px;
            padding: 10px;
            border: 2px solid black;
        }

        .header{
            background: red;
            padding: 30px 0;
            margin-bottom: 10px;
        }

        .nav{
            background: aqua;
            padding: 25px 0;
            margin-bottom: 10px;
        }

        .main{
            display: flex;
            flex-wrap: wrap;
            width: 100%;
        }

        .section{
            width: 55%;
            margin-right: 10px;
        }

        .section1{
            background: orange;
            padding: 50px 0;
            margin-bottom: 10px;
        }

        .article{
            background: orangered;
            padding: 50px 0;
            margin-bottom: 10px;
        }

        .aside{
            width: 44%;
            background: palevioletred;
            padding: 100px 0px;
            margin-bottom: 10px;
        }
        .footer
        {
            height: 30%;
            width: 100%;
            background-color: grey;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="box">

        <div class="header">header</div>

        <div class="nav">nav</div>

        <div class="main">

            <div class="section">
                <div class="section1">section</div>
                <div class="article">article</div>
            </div>
            <div class="aside">aside</div>

        </div>
        <footer class="footer">Footer</footer>

    </div>

</body>
</html>
