<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task3</title>

    <style>
        body{
            background:#5f9ea0;
            margin:0;
            padding:0;
        }

        .container{
            width:80%;
            margin:20px auto;
            border:15px solid #f08050;
            padding:10px;
            background:#fff;
        }

        .header{
            background:blue;
            color:white;
            padding:30px 0;
            font-size:30px;
            font-weight:bold;
            text-align:center;
            margin-bottom:15px;
        }

        .nav{
            background:darkgreen;
            padding:20px 0;
            margin-bottom:15px;
        }

        .main{
            display:flex;
            justify-content:space-between;
            margin-bottom:15px;
        }

        .left{
            width:65%;
            height:300px;
            background:#b4a7d6;
            border:10px solid #f08050;
        }

        .right{
            width:30%;
            height:300px;
            background:yellow;
            border:10px solid #f08050;
        }

        .footer{
            display:flex;
            justify-content:space-between;
        }

        .footer div{
            width:30%;
            height:120px;
            background:white;
            border:10px solid #f08050;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">Basic Layout</div>

        <div class="nav"></div>

        <div class="main">
            <div class="left"></div>
            <div class="right"></div>
        </div>

        <div class="footer">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>

    </div>

</body>
</html>
