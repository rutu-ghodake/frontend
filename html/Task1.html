<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task1</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .header{
            display: flex;
            width: 100%;
            height: 80px;
        }
        .logo1{
            width: 30%;
            background-color: red;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo2{
            width: 70%;
            background-color: green;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .menu{
            width: 100%;
            background: yellow;
            padding: 20px 0;
        }
        .box{
            width: 100%;
            display: flex;
            height: 150px;
        }
        .box1{
            width: 33.33%;
            background: blue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box2{
            width: 33.33%;
            background: gray;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box3{
            width: 33.33%;
            background: plum;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .body{
            width: 100%;
            display: flex;
            height: 350px;
        }
        .bar1{
            width: 75%;
            background: aqua;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bar2{
            width: 25%;
            background: olive;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        footer{
            background: skyblue;
            padding: 25px 0;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo1">LOGO</div>
        <div class="logo2">Website Heading</div>
    </div>

    <div class="menu">MENU</div>

    <div class="box">
        <div class="box1">SECTION 1</div>
        <div class="box2">SECTION 2</div>
        <div class="box3">SECTION 3</div>
    </div>

    <div class="body">
        <div class="bar1">PAGE CONTENTS</div>
        <div class="bar2">SIDE BAR</div>
    </div>

    <footer>PAGE FOOTER</footer>

</body>
</html>
