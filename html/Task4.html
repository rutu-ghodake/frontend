<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task4</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#ddd;
            font-family:Arial;
            text-align:center;
        }

        .container{
            width:90%;
            margin:0 auto;
        }
        .header{
            background:#7a94ac;
            padding:40px 0;
            margin:10px 0;
            font-size:28px;
            font-weight:bold;
        }
        .slider{
            background:#e4e4e4;
            padding:70px 0;
            margin:10px 0;
            font-size:24px;
        }
        .spacer{
            background:#b58d8d;
            padding:20px 0;
            margin:10px 0;
            font-size:20px;
        }
        .row{
            display:flex;
            justify-content:space-between;
            margin:15px 0;
        }

        .article{
            width:23%;
            height:120px;
            background:#8b8bc0;
            padding-top:45px;
            font-size:20px;
            border:10px solid #96b6a1;
        }

        .article-big{
            width:60%;
            height:250px;
            background:#8b8bc0;
            padding-top:100px;
            font-size:25px;
            border:10px solid #b5888c;
        }

        .article-right-box{
            width:35%;
        }

        .small-article{
            height:110px;
            background:#8b8bc0;
            padding-top:40px;
            margin-bottom:10px;
            border:10px solid #8fd0c8;
        }
        .bottom-row .article{
            width:30%;
            height:140px;
        }
        .footer{
            background:#7a94ac;
            padding:20px 0;
            margin:15px 0;
            font-size:20px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">Header</div>

    <div class="slider">Slider-Images</div>

    <div class="spacer">Spacer</div>

   
    <div class="row">
        <div class="article">Article</div>
        <div class="article">Article</div>
        <div class="article">Article</div>
    </div>


    <div class="row">
        <div class="article">Article</div>
        <div class="article">Article</div>
        <div class="article">Article</div>
        <div class="article">Article</div>
    </div>

    <div class="row">
        <div class="article-big">Article</div>

        <div class="article-right-box">
            <div class="small-article">Article</div>
            <div class="small-article">Article</div>
        </div>
    </div>

    <div class="row bottom-row">
        <div class="article">Article</div>
        <div class="article">Article</div>
        <div class="article">Article</div>
    </div>

    <div class="footer">Copyright</div>

</div>

</body>
</html>
