<!DOCTYPE html>
<html lang="en">
<head>
  <title>R.V.G Rasoi - Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
     @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

    body {
    background-image: url("../Myproject.html/image/background-image.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
   }
   .brand
   {
  font-family: 'Great Vibes', cursive; /* Elegant script font */
  font-size: 30px;                   /* Adjust as needed */
  color: rgb(75, 18, 18);                    /* Gold color */
  text-align: center;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.4); /* Soft shadow */
  letter-spacing: 1px;
  margin-bottom: 20px;               /* Spacing below logo */
}


    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
    }

    .login-box {
      background: #fff;
      border-radius: 10px;
      padding: 30px;
      max-width: 350px;
      width: 100%;
    }

    .btn-custom {
      background: #ffcc00;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="overlay d-flex justify-content-center align-items-center">
  <div class="login-box text-center shadow">

    <img 
  src="image/brand.png" 
  alt="R SmartDine Logo"
  class="mb-3"
  style="width:170px; display:block; margin:0 auto;">

    <h4 class="mb-4">Welcome to <span class="brand"> "R.V.G Rasoi"</span></h4>

    <!-- Name first -->
    <input type="text" id="name" class="form-control mb-3" placeholder="Enter Your Name">

    <!-- Mobile number second -->
    <input type="text" id="mobile" class="form-control mb-3" placeholder="Enter Mobile Number">

    <input type="date" id="dob" class="form-control mb-3">

    <button class="btn btn-custom w-100" onclick="login()">Login</button>

    <p class="mt-3 text-muted" style="font-size:12px;">
      New user? Details will be saved automatically.
    </p>

  </div>
</div>

<script>
  function login() {
    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let dob = document.getElementById("dob").value;

     // Check if fields are empty
    if (name === "" || mobile === "" || dob === "") {
      alert("Please fill all details");
      return;
    }

    // Check if mobile is exactly 10 digits and only numbers
    let mobileRegex = /^\d{10}$/;
    if (!mobileRegex.test(mobile)) {
      alert("Please enter a valid 10-digit mobile number");
      return;
    }

    // Redirect to services page if validation passes
    window.location.href = "services.html";
  }
</script>

</body>
</html>
