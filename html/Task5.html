<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task5</title>
    <style>
        *
        {
            padding: 0;
            margin: 0;
            background-color: lightblue;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 22;
            font-weight: bold;
            color: white;
            position: static;
            text-align: center;
        }
        .big-box
        {
            margin: 200px ;
            margin-bottom: 30px;
            align-items: center;
            justify-content: center ;   
            
        }
        .box
        {
            display: flex;
            width: 100%;
            height: 200px;
            justify-content: space-evenly;
        }
        .box1
        {
            width: 25%;
            background-color: black;
            display: flex;              
            justify-content: center;    
            align-items: center;     
        }
        .box2
        {
            width: 25%;
            background-color: skyblue;
             display: flex;              
            justify-content: center;    
            align-items: center;  
        }
        .box3
        {
            width: 25%;
            background-color: lightseagreen;
             display: flex;              
            justify-content: center;    
            align-items: center;  
        }
        .box4
        {
            width: 25%;
            background-color: black;
             display: flex;              
            justify-content: center;    
            align-items: center;  
        }
        .content
        {
            width: 100%;
            height: 500px;
            display: flex;
        }
        .section1
        {
            background-color: gray;
            display: table-row;
            height: 600px;
            width: 25%;
        }
        .section2
        {
            background-color:black ;
            width: 50%;
        }
        .section3
        {
            background-color:gray ;
            width: 25%;
            height: 600px;
            align-items: center;
        }
        .heading1
        {
            width: 100%;
            height: 300px;
            background-color: black;
        }
        .sider
        {
            display: flex;
        }
        .heading2
        {
            width: 50%;
            background-color: skyblue;
            height:300px ;
        }
        .heading3
        {
            width: 50%;
            background-color: lightseagreen;
            height:300px ;
        }
    
    </style>
</head>
<body>
    <div class="big-box">
        <div class="box">
            <div class="box1">Heading</div>
            <div class="box2">Heading</div>
            <div class="box3">Heading</div>
            <div class="box4">Heading</div>
        </div>
    <div class="content">
        <div class="section1">Heading</div>
        <div class="section2">
            <div class="heading1">Heading</div>
            <div class="sider">
            <div class="heading2">Heading</div>
            <div class="heading3">Heading</div>
            </div>
        </div>
        <div class="section3">Heading</div>
    </div>
    </div>
</body>
</html>
